version: '3.8'

services:
  backend:
    build: ./backend
    container_name: haven-homes-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # Change this to your public IP or domain in production
        - VITE_API_BASE_URL=http://localhost:4000
    container_name: haven-homes-frontend
    ports:
      - "80:80"
    restart: always

  admin:
    build:
      context: ./admin
      args:
        # Change this to your public IP or domain in production
        - VITE_API_BASE_URL=http://localhost:4000
    container_name: haven-homes-admin
    ports:
      - "81:80"
    restart: always
